<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" font-family="Calibri, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="520" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">UML Class Diagram — Library Management System</text>
  <line x1="80" y1="45" x2="720" y2="45" stroke="#cccccc" stroke-width="1"/>

  <!-- ===== BOOK CLASS ===== -->
  <!-- Header box -->
  <rect x="60" y="70" width="200" height="40" fill="#1a1a2e" rx="4"/>
  <text x="160" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Book</text>
  <!-- Attributes box -->
  <rect x="60" y="110" width="200" height="100" fill="white" stroke="#1a1a2e" stroke-width="2" rx="0"/>
  <text x="75" y="135" font-size="13" fill="#c0392b" font-weight="bold">+ ISBN: VARCHAR(13) «PK»</text>
  <text x="75" y="158" font-size="13" fill="#2c3e50">+ Title: VARCHAR(100)</text>
  <text x="75" y="181" font-size="13" fill="#2c3e50">+ Author: VARCHAR(100)</text>
  <!-- Methods box -->
  <rect x="60" y="210" width="200" height="50" fill="#eaf0fb" stroke="#1a1a2e" stroke-width="2"/>
  <text x="75" y="232" font-size="12" fill="#555">+ getDetails(): String</text>
  <text x="75" y="251" font-size="12" fill="#555">+ isAvailable(): Boolean</text>

  <!-- ===== MEMBER CLASS ===== -->
  <rect x="540" y="70" width="210" height="40" fill="#1a1a2e" rx="4"/>
  <text x="645" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Member</text>
  <rect x="540" y="110" width="210" height="100" fill="white" stroke="#1a1a2e" stroke-width="2"/>
  <text x="555" y="135" font-size="13" fill="#c0392b" font-weight="bold">+ MemberID: INT «PK»</text>
  <text x="555" y="158" font-size="13" fill="#2c3e50">+ Name: VARCHAR(100)</text>
  <text x="555" y="181" font-size="13" fill="#2c3e50">+ Email: VARCHAR(100)</text>
  <rect x="540" y="210" width="210" height="50" fill="#eaf0fb" stroke="#1a1a2e" stroke-width="2"/>
  <text x="555" y="232" font-size="12" fill="#555">+ getProfile(): String</text>
  <text x="555" y="251" font-size="12" fill="#555">+ borrowBook(): void</text>

  <!-- ===== BORROWING CLASS (center) ===== -->
  <rect x="285" y="300" width="230" height="40" fill="#c0392b" rx="4"/>
  <text x="400" y="326" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Borrowing</text>
  <rect x="285" y="340" width="230" height="120" fill="white" stroke="#c0392b" stroke-width="2"/>
  <text x="300" y="365" font-size="13" fill="#c0392b" font-weight="bold">+ BorrowID: INT «PK»</text>
  <text x="300" y="388" font-size="13" fill="#7f1111">+ MemberID: INT «FK»</text>
  <text x="300" y="411" font-size="13" fill="#7f1111">+ ISBN: VARCHAR(13) «FK»</text>
  <text x="300" y="434" font-size="13" fill="#2c3e50">+ BorrowDate: DATE</text>
  <text x="300" y="457" font-size="13" fill="#2c3e50">+ ReturnDate: DATE</text>
  <rect x="285" y="460" width="230" height="40" fill="#fdecea" stroke="#c0392b" stroke-width="2"/>
  <text x="300" y="484" font-size="12" fill="#555">+ calculateDuration(): INT</text>

  <!-- ===== RELATIONSHIP LINES ===== -->

  <!-- Book → Borrowing (line from Book bottom to Borrowing left) -->
  <line x1="160" y1="260" x2="160" y2="320" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="160" y1="320" x2="285" y2="370" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Arrow at Borrowing end -->
  <polygon points="285,370 272,362 272,378" fill="#555"/>

  <!-- Member → Borrowing -->
  <line x1="645" y1="260" x2="645" y2="320" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="645" y1="320" x2="515" y2="370" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="515,370 528,362 528,378" fill="#555"/>

  <!-- Multiplicity labels -->
  <!-- Book side -->
  <text x="110" y="275" font-size="13" fill="#1a1a2e" font-weight="bold">1</text>
  <text x="225" y="355" font-size="13" fill="#c0392b" font-weight="bold">*</text>
  <!-- Member side -->
  <text x="655" y="275" font-size="13" fill="#1a1a2e" font-weight="bold">1</text>
  <text x="545" y="355" font-size="13" fill="#c0392b" font-weight="bold">*</text>

  <!-- Relationship label -->
  <text x="225" y="308" font-size="11" fill="#888" font-style="italic">borrows</text>
  <text x="520" y="308" font-size="11" fill="#888" font-style="italic">borrowed by</text>

  <!-- Legend -->
  <rect x="60" y="460" width="180" height="48" fill="white" stroke="#ccc" stroke-width="1" rx="3"/>
  <text x="70" y="476" font-size="11" fill="#555" font-weight="bold">Legend</text>
  <text x="70" y="492" font-size="11" fill="#c0392b">«PK» = Primary Key</text>
  <text x="70" y="506" font-size="11" fill="#7f1111">«FK» = Foreign Key</text>

</svg>
